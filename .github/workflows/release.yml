name: Release plugin

# Obsidian release contract (BRAT + community directory):
#   • The git tag MUST equal the version in manifest.json — no "v" prefix.
#   • The GitHub release carries manifest.json and the built main.js as
#     individual assets (not a zip).
# Cut a release with:  git tag 0.1.0 && git push origin 0.1.0
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p 'require("./manifest.json").version')"
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME != manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      # Release notes = this version's CHANGELOG.md section (synced from the
      # monorepo, where the changelog gate guarantees the entry exists).
      # Fallback to auto-generated notes if the file/section is missing.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARGS=(--generate-notes)
          if [ -f CHANGELOG.md ]; then
            awk -v v="## $GITHUB_REF_NAME" '
              index($0, v) == 1 { flag = 1; next }
              /^## / && flag { exit }
              flag { print }
            ' CHANGELOG.md > RELEASE_NOTES.md
            if [ -s RELEASE_NOTES.md ]; then NOTES_ARGS=(--notes-file RELEASE_NOTES.md); fi
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            "${NOTES_ARGS[@]}" \
            manifest.json main.js
