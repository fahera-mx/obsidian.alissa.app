name: Release plugin

# Obsidian release contract (BRAT + community directory):
#   • The git tag MUST equal the version in manifest.json — no "v" prefix.
#   • The GitHub release carries manifest.json and the built main.js as
#     individual assets (not a zip).
# Cut a release with:  git tag 0.1.0 && git push origin 0.1.0
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p 'require("./manifest.json").version')"
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME != manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            manifest.json main.js
